        <text x="44" y="17" text-anchor="middle" fill="#58a6ff" font-weight="600">鲁迅</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">Lu Xun · 中文</text>
      </g>
      <g transform="translate(110, 58)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#8957e510" stroke="#8957e530" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#bc8cff" font-weight="600">太宰治</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">Dazai · 日本語</text>
      </g>
      <g transform="translate(208, 58)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#db61a210" stroke="#db61a230" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#f778ba" font-weight="600">Kafka</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">卡夫卡 · Deutsch</text>
      </g>
      <g transform="translate(306, 58)">
        <rect x="0" y="0" width="82" height="42" rx="5" fill="#23863610" stroke="#23863630" stroke-width="0.5"/>
        <text x="41" y="17" text-anchor="middle" fill="#3fb950" font-weight="600">Tolstoy</text>
        <text x="41" y="32" text-anchor="middle" fill="#484f58">托尔斯泰 · Рус</text>
      </g>
      <!-- Row 2 -->
      <g transform="translate(12, 108)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#d1861610" stroke="#d1861630" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#f0883e" font-weight="600">芥川</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">Akutagawa · 日</text>
      </g>
      <g transform="translate(110, 108)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#1f6feb10" stroke="#1f6feb30" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#58a6ff" font-weight="600">Dostoevsky</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">陀氏 · Русский</text>
      </g>
      <g transform="translate(208, 108)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#8957e510" stroke="#8957e530" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#bc8cff" font-weight="600">Fitzgerald</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">菲茨杰拉德 · EN</text>
      </g>
      <g transform="translate(306, 108)">
        <rect x="0" y="0" width="82" height="42" rx="5" fill="#db61a210" stroke="#db61a230" stroke-width="0.5"/>
        <text x="41" y="17" text-anchor="middle" fill="#f778ba" font-weight="600">Schopenhauer</text>
        <text x="41" y="32" text-anchor="middle" fill="#484f58">叔本华 · DE</text>
      </g>
      <!-- Row 3 -->
      <g transform="translate(12, 158)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#23863610" stroke="#23863630" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#3fb950" font-weight="600">漱石</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">Soseki · 日本語</text>
      </g>
      <g transform="translate(110, 158)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#d1861610" stroke="#d1861630" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#f0883e" font-weight="600">谷崎</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">Tanizaki · 日</text>
      </g>
      <g transform="translate(208, 158)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#1f6feb10" stroke="#1f6feb30" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#58a6ff" font-weight="600">Gorky</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">高尔基 · Русский</text>
      </g>
      <g transform="translate(306, 158)">
        <rect x="0" y="0" width="82" height="42" rx="5" fill="#8957e510" stroke="#8957e530" stroke-width="0.5"/>
        <text x="41" y="17" text-anchor="middle" fill="#bc8cff" font-weight="600">南方周末</text>
        <text x="41" y="32" text-anchor="middle" fill="#484f58">中文 · Journalism</text>
      </g>
      <!-- Row 4 -->
      <g transform="translate(12, 208)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#db61a210" stroke="#db61a230" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#f778ba" font-weight="600">人民日报</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">中文 · Commentary</text>
      </g>
      <g transform="translate(110, 208)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#23863610" stroke="#23863630" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#3fb950" font-weight="600">澎湃新闻</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">中文 · Journalism</text>
      </g>
      <g transform="translate(208, 208)">
        <rect x="0" y="0" width="88" height="42" rx="5" fill="#d1861610" stroke="#d1861630" stroke-width="0.5"/>
        <text x="44" y="17" text-anchor="middle" fill="#f0883e" font-weight="600">新华社</text>
        <text x="44" y="32" text-anchor="middle" fill="#484f58">中文 · News Agency</text>
      </g>
      <g transform="translate(306, 208)">
        <rect x="0" y="0" width="82" height="42" rx="5" fill="#1f6feb10" stroke="#1f6feb30" stroke-width="0.5"/>
        <text x="41" y="17" text-anchor="middle" fill="#58a6ff" font-weight="600">小约翰可汗</text>
        <text x="41" y="32" text-anchor="middle" fill="#484f58">中文 · Knowledge</text>
      </g>
