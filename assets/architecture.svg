    <!-- Sub-skill structure note -->
    <g transform="translate(20, 265)">
      <rect x="0" y="0" width="360" height="32" rx="5" fill="#f778ba08" stroke="#f778ba30" stroke-width="0.5"/>
      <text x="180" y="13" font-family="system-ui, sans-serif" font-size="10" fill="#f778ba" text-anchor="middle" font-weight="600">Each sub-skill contains:</text>
      <text x="180" y="27" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">SKILL.md (9-section structure, ≤500 lines) + test-prompts.json (15-30 prompts)</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 490)">
    <g font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">
      <circle cx="10" cy="8" r="4" fill="#58a6ff" opacity="0.5"/>
      <text x="20" y="12">Routing</text>
      <circle cx="90" cy="8" r="4" fill="#bc8cff" opacity="0.5"/>
      <text x="100" y="12">Factory</text>
      <circle cx="170" cy="8" r="4" fill="#f778ba" opacity="0.5"/>
      <text x="180" y="12">Sub-skills</text>
      <circle cx="260" cy="8" r="4" fill="#3fb950" opacity="0.5"/>
      <text x="270" y="12">Feedback</text>
      <circle cx="340" cy="8" r="4" fill="#f0883e" opacity="0.5"/>
      <text x="350" y="12">Scoring</text>
    </g>
  </g>
</svg>
